<!-- Extracted from dashboard.py so backend route logic and page markup stay separate. -->
<!doctype html>
<html lang="en" x-data="dashboard()">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Jobs Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
  </head>

  <body class="bg-slate-50 text-slate-900">
    <div class="w-full p-4 space-y-6">
      <header class="space-y-2">
        <h1 class="text-2xl font-bold tracking-tight">Impact Dashboard</h1>

        <div class="flex flex-wrap gap-2">
          <button @click="view='runs'"
                  :class="view==='runs' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-700'"
                  class="px-3 py-2 rounded-lg border border-slate-200 text-sm">
            Integration Runs
          </button>
          <button @click="view='jobs'"
                  :class="view==='jobs' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-700'"
                  class="px-3 py-2 rounded-lg border border-slate-200 text-sm">
            Query Builder
          </button>
          <button @click="view='lookup'"
                  :class="view==='lookup' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-700'"
                  class="px-3 py-2 rounded-lg border border-slate-200 text-sm">
            Job lookup
          </button>
          <button @click="view='discovery'; loadDiscovery()"
                  :class="view==='discovery' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-700'"
                  class="px-3 py-2 rounded-lg border border-slate-200 text-sm">
            Discovery
          </button>
          <a href="/steps"
             class="px-3 py-2 rounded-lg border border-slate-200 text-sm bg-white text-slate-700">
            Steps editor
          </a>
          <a href="/swipe"
             class="px-3 py-2 rounded-lg border border-slate-200 text-sm bg-white text-slate-700">
            Swipe
          </a>
        </div>
      </header>

      <!-- ---------------- RUNS VIEW ---------------- -->
      <template x-if="view==='runs'">
        <div class="space-y-6">

          <section class="flex flex-col md:flex-row md:items-center gap-3">
            <div class="flex items-center gap-2">
              <label for="days" class="text-sm font-medium text-slate-700">Days:</label>
              <select id="days" x-model.number="days"
                      class="px-3 py-2 rounded-lg border border-slate-300 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="7">7</option>
                <option value="14">14</option>
                <option value="30" selected>30</option>
                <option value="60">60</option>
                <option value="90">90</option>
              </select>
              <button @click="loadRuns()"
                      class="ml-2 inline-flex items-center px-3 py-2 rounded-lg bg-indigo-600 text-white text-sm hover:bg-indigo-700 active:bg-indigo-800">
                Refresh
              </button>
            </div>
            <div class="text-sm text-slate-600" x-show="runsLoaded">
              <span class="font-semibold text-slate-800">Summary:</span>
              <span class="ml-2">New: <span class="font-semibold" x-text="sum(inserted)"></span></span>
              <span class="ml-2">Updated: <span class="font-semibold" x-text="sum(updated)"></span></span>
              <span class="ml-2">Missing: <span class="font-semibold" x-text="sum(missing)"></span></span>
              <span class="ml-2">Errors: <span class="font-semibold" x-text="sum(error)"></span></span>
              <span class="ml-2">Total Seen: <span class="font-semibold" x-text="sum(total_seen)"></span></span>
              <span class="ml-2">Net Δ: <span class="font-semibold" x-text="sum(net_change)"></span></span>
            </div>
          </section>

          <section class="bg-white rounded-xl shadow-sm ring-1 ring-slate-200 p-4">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
              <h2 class="text-sm font-semibold text-slate-800">Runs</h2>
              <label class="inline-flex items-center gap-2 text-sm text-slate-700">
                <input type="checkbox" x-model="hideTestRuns" class="rounded border-slate-300" />
                Hide test items
              </label>
            </div>
            <div class="mt-3 overflow-x-auto">
              <table class="min-w-full text-sm">
                <thead class="text-left text-slate-600 border-b">
                  <tr>
                    <th class="py-2 pr-4">ID</th>
                    <th class="py-2 pr-4">Started</th>
                    <th class="py-2 pr-4">Finished</th>
                    <th class="py-2 pr-4">Status</th>
                    <th class="py-2 pr-4">Mode</th>
                    <th class="py-2 pr-4">User</th>
                    <th class="py-2 pr-4 text-right">New</th>
                    <th class="py-2 pr-4 text-right">Updated</th>
                    <th class="py-2 pr-4 text-right">Missing</th>
                    <th class="py-2 pr-4 text-right">Unchanged</th>
                    <th class="py-2 pr-4 text-right">Errors</th>
                    <th class="py-2 pr-4 text-right">Total Seen</th>
                  </tr>
                </thead>
                <tbody x-show="runsLoaded" class="divide-y divide-slate-100">
                  <template x-for="row in visibleRuns()" :key="row.id">
                    <tr class="text-slate-700">
                      <td class="py-2 pr-4 font-medium text-slate-900" x-text="row.id"></td>
                      <td class="py-2 pr-4 whitespace-nowrap" x-text="formatRunTime(row.started_at)"></td>
                      <td class="py-2 pr-4 whitespace-nowrap" x-text="formatRunTime(row.finished_at)"></td>
                      <td class="py-2 pr-4" x-text="row.status || '-'"></td>
                      <td class="py-2 pr-4" x-text="row.mode || '-'"></td>
                      <td class="py-2 pr-4" x-text="row.user || '-'"></td>
                      <td class="py-2 pr-4 text-right" x-text="row.inserted"></td>
                      <td class="py-2 pr-4 text-right" x-text="row.updated"></td>
                      <td class="py-2 pr-4 text-right" x-text="row.missing"></td>
                      <td class="py-2 pr-4 text-right" x-text="row.unchanged"></td>
                      <td class="py-2 pr-4 text-right" x-text="row.error"></td>
                      <td class="py-2 pr-4 text-right" x-text="row.total_seen"></td>
                    </tr>
                  </template>
                  <tr x-show="filteredRuns().length === 0">
                    <td colspan="12" class="py-3 text-slate-500">No runs found for the selected day range.</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="mt-3 flex justify-end" x-show="canLoadMoreRuns()">
              <button @click="loadMoreRuns()"
                      class="px-3 py-2 rounded-lg border border-slate-300 bg-white text-sm text-slate-700 hover:bg-slate-50">
                Load more
              </button>
            </div>
          </section>

          <section class="bg-white rounded-xl shadow-sm ring-1 ring-slate-200 p-4">
            
            <h2 class="text-sm font-semibold text-slate-800 mb-2">Daily counts</h2>
            <div class="h-80">
              <canvas id="runsChart"></canvas>
            </div>
          </section>

          <section class="bg-white rounded-xl shadow-sm ring-1 ring-slate-200 p-4">
            <h2 class="text-sm font-semibold text-slate-800 mb-2">Change rate (%) and net rate (%)</h2>
            <div class="h-64">
              <canvas id="runsRateChart"></canvas>
            </div>
            <p class="mt-2 text-xs text-slate-500">
              Change % = (Inserted + Updated + Missing) / Total Seen · 100. Net % = (Inserted − Missing) / Total Seen · 100.
              Dashed lines show 7-day rolling averages.
            </p>
          </section>

        </div>
      </template>

          <!-- ---------------- QUERY BUILDER VIEW ---------------- -->
      <template x-if="view==='jobs'">
        <div class="space-y-3">
          <div x-show="queryLoading"
               x-cloak
               role="dialog"
               aria-modal="true"
               aria-live="polite"
               class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/45 px-4">
            <div class="w-full max-w-sm border border-slate-200 bg-white p-5 shadow-xl">
              <div class="flex items-start gap-3">
                <div class="h-9 w-9 shrink-0 animate-spin rounded-full border-2 border-slate-200 border-t-indigo-600"></div>
                <div>
                  <h2 class="text-base font-semibold text-slate-950">Running query</h2>
                  <p class="mt-1 text-sm text-slate-600" x-text="queryMessage || 'Loading results from the database.'"></p>
                  <p class="mt-2 font-mono text-xs text-slate-400" x-show="activeQueryId">
                    id=<span x-text="queryDebugId()"></span>
                  </p>
                </div>
              </div>
            </div>
          </div>

          <section class="bg-white border border-slate-200 p-3">
            <div class="flex flex-wrap items-center gap-2">
              <h2 class="text-base font-semibold text-slate-900 mr-2">Query Builder</h2>
              <select x-model="selectedReportId" @change="loadSelectedReport()"
                      class="min-w-48 px-3 py-2 border border-slate-300 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="">Unsaved report</option>
                <template x-for="report in queryReports" :key="report.id">
                  <option :value="String(report.id)" x-text="report.title"></option>
                </template>
              </select>
              <input type="text" x-model="reportTitle" placeholder="Short report title"
                     class="w-56 px-3 py-2 border border-slate-300 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
              <button @click="loadJobs()"
                      class="px-3 py-2 bg-indigo-600 text-white text-sm hover:bg-indigo-700">Run</button>
              <button @click="saveReport(false)"
                      class="px-3 py-2 border border-slate-300 bg-white text-sm text-slate-700 hover:bg-slate-50">Save</button>
              <button @click="saveReport(true)" :disabled="!selectedReportId"
                      class="px-3 py-2 border border-slate-300 bg-white text-sm text-slate-700 hover:bg-slate-50 disabled:opacity-40">Update</button>
              <button @click="deleteReport()" :disabled="!selectedReportId"
                      class="px-3 py-2 border border-red-200 bg-white text-sm text-red-700 hover:bg-red-50 disabled:opacity-40">Delete</button>
              <button @click="exportJobs('csv')"
                      class="px-3 py-2 border border-slate-300 bg-white text-sm text-slate-700 hover:bg-slate-50">Export CSV</button>
              <button @click="exportJobs('json')"
                      class="px-3 py-2 border border-slate-300 bg-white text-sm text-slate-700 hover:bg-slate-50">Export JSON</button>
              <button @click="queryPanelOpen = !queryPanelOpen"
                      class="ml-auto px-3 py-2 border border-slate-300 bg-white text-sm text-slate-700 hover:bg-slate-50"
                      x-text="queryPanelOpen ? 'Hide builder' : 'Show builder'"></button>
            </div>
            <div class="mt-2 flex flex-wrap items-center gap-3 text-xs text-slate-500">
              <span x-text="queryMessage" :class="queryError ? 'font-medium text-red-700' : ''"></span>
              <span x-show="jobsLoaded">returned=<span x-text="jobsMeta.returned"></span></span>
              <span x-show="jobsLoaded">cutoff=<span x-text="jobsMeta.cutoff_iso"></span></span>
              <span x-show="jobsLoaded">columns=<span x-text="selectedColumns.length"></span></span>
              <span x-show="activeQueryId && !jobsLoaded">query=<span class="font-mono" x-text="queryDebugId()"></span></span>
            </div>
          </section>

          <div class="grid grid-cols-1 xl:grid-cols-[340px_minmax(0,1fr)] gap-3">
            <aside class="bg-white border border-slate-200 p-3 space-y-4" x-show="queryPanelOpen">
              <div class="space-y-2">
                <div class="text-sm font-semibold text-slate-800">Quick filters</div>
                <div class="grid grid-cols-2 gap-2">
                  <label class="text-xs text-slate-600">Hours
                    <select x-model="hours" class="mt-1 w-full px-2 py-2 border border-slate-300 bg-white text-sm">
                      <option value="all">All</option>
                      <option value="24">24</option>
                      <option value="48">48</option>
                      <option value="72">72</option>
                      <option value="168">168</option>
                    </select>
                  </label>
                  <label class="text-xs text-slate-600">Limit
                    <input type="number" x-model.number="jobsLimit" min="1" max="500"
                           class="mt-1 w-full px-2 py-2 border border-slate-300 bg-white text-sm"/>
                  </label>
                  <label class="text-xs text-slate-600">Min match
                    <input type="number" x-model.number="minAiMatch" min="0" max="100"
                           class="mt-1 w-full px-2 py-2 border border-slate-300 bg-white text-sm"/>
                  </label>
                  <label class="text-xs text-slate-600">Location
                    <select x-model="locationPolicy" class="mt-1 w-full px-2 py-2 border border-slate-300 bg-white text-sm">
                      <option value="any">Any</option>
                      <option value="non_hybrid">Exclude hybrid</option>
                      <option value="remote">Remote only</option>
                      <option value="hybrid">Hybrid only</option>
                      <option value="onsite">Onsite only</option>
                      <option value="unknown">Unknown only</option>
                    </select>
                  </label>
                </div>
                <input type="text" x-model="q" placeholder="Search site, job ID, title, level, pay"
                       class="w-full px-3 py-2 border border-slate-300 bg-white text-sm"/>
              </div>

              <div class="space-y-2">
                <div class="flex items-center justify-between gap-2">
                  <div class="text-sm font-semibold text-slate-800">Columns</div>
                  <input type="text" x-model="columnSearch" placeholder="Find"
                         class="w-28 px-2 py-1 border border-slate-300 bg-white text-xs"/>
                </div>
                <div class="flex flex-wrap gap-1">
                  <button @click="setDefaultColumns()" class="px-2 py-1 border border-slate-300 text-xs">Default</button>
                  <button @click="selectAllColumns()" class="px-2 py-1 border border-slate-300 text-xs">Select all</button>
                  <button @click="clearColumns()" class="px-2 py-1 border border-slate-300 text-xs">Clear</button>
                  <button @click="selectRawColumns()" class="px-2 py-1 border border-slate-300 text-xs">Raw fields</button>
                </div>
                <div class="border border-slate-200">
                  <div class="px-2 py-1 bg-slate-50 text-xs font-semibold text-slate-600">Selected order</div>
                  <div class="max-h-44 overflow-auto p-2 space-y-1">
                    <template x-for="(key, index) in selectedColumns" :key="key">
                      <div draggable="true"
                           @dragstart="dragColumnStart(key)"
                           @dragover.prevent
                           @drop.prevent="dropColumn(key)"
                           class="flex items-center gap-1 border border-slate-200 bg-white px-2 py-1 text-xs text-slate-700 cursor-move">
                        <span class="select-none text-slate-400" title="Drag to reorder">::</span>
                        <span class="flex-1 truncate" x-text="columnLabel(key)"></span>
                        <button type="button" @click="moveColumn(index, -1)" class="px-1 text-slate-500 hover:text-slate-900" title="Move left">Up</button>
                        <button type="button" @click="moveColumn(index, 1)" class="px-1 text-slate-500 hover:text-slate-900" title="Move right">Down</button>
                        <button type="button" @click="toggleColumn(key)" class="px-1 text-red-600" title="Remove column">x</button>
                      </div>
                    </template>
                    <div class="text-xs text-slate-400" x-show="selectedColumns.length === 0">No columns selected.</div>
                  </div>
                </div>
                <template x-for="group in columnGroups()" :key="group.name">
                  <div class="border border-slate-200">
                    <div class="px-2 py-1 bg-slate-50 text-xs font-semibold text-slate-600" x-text="group.name"></div>
                    <div class="max-h-44 overflow-auto p-2 space-y-1">
                      <template x-for="col in group.columns" :key="col.key">
                        <label class="flex items-center gap-2 text-xs text-slate-700">
                          <input type="checkbox" :checked="selectedColumns.includes(col.key)" @change="toggleColumn(col.key)">
                          <span x-text="col.label"></span>
                        </label>
                      </template>
                    </div>
                  </div>
                </template>
              </div>

              <div class="space-y-2">
                <div class="flex items-center justify-between">
                  <div class="text-sm font-semibold text-slate-800">Filters</div>
                  <select x-model="filterRoot.op" class="px-2 py-1 border border-slate-300 bg-white text-xs uppercase">
                    <option value="and">AND</option>
                    <option value="or">OR</option>
                  </select>
                </div>
                <div class="space-y-2">
                  <template x-for="(item, index) in filterRoot.items" :key="item.id">
                    <div class="border border-slate-200 p-2 space-y-2">
                      <template x-if="!item.items">
                        <div class="grid grid-cols-[1fr_110px_1fr_24px] gap-1">
                          <select x-model="item.field" class="px-2 py-1 border border-slate-300 bg-white text-xs">
                            <template x-for="col in availableColumns" :key="col.key">
                              <option :value="col.key" x-text="col.label"></option>
                            </template>
                          </select>
                          <select x-model="item.operator" class="px-2 py-1 border border-slate-300 bg-white text-xs">
                            <template x-for="op in operators" :key="op">
                              <option :value="op" x-text="op"></option>
                            </template>
                          </select>
                          <input x-model="item.value" class="px-2 py-1 border border-slate-300 text-xs" placeholder="Value">
                          <button @click="removeFilter(filterRoot, index)" class="text-red-600 text-xs">x</button>
                        </div>
                      </template>
                      <template x-if="item.items">
                        <div class="space-y-2">
                          <div class="flex items-center gap-2">
                            <select x-model="item.op" class="px-2 py-1 border border-slate-300 bg-white text-xs uppercase">
                              <option value="and">AND</option>
                              <option value="or">OR</option>
                            </select>
                            <button @click="addFilter(item)" class="px-2 py-1 border border-slate-300 text-xs">Add filter</button>
                            <button @click="removeFilter(filterRoot, index)" class="ml-auto text-red-600 text-xs">Remove group</button>
                          </div>
                          <template x-for="(child, childIndex) in item.items" :key="child.id">
                            <div class="grid grid-cols-[1fr_110px_1fr_24px] gap-1">
                              <select x-model="child.field" class="px-2 py-1 border border-slate-300 bg-white text-xs">
                                <template x-for="col in availableColumns" :key="col.key">
                                  <option :value="col.key" x-text="col.label"></option>
                                </template>
                              </select>
                              <select x-model="child.operator" class="px-2 py-1 border border-slate-300 bg-white text-xs">
                                <template x-for="op in operators" :key="op">
                                  <option :value="op" x-text="op"></option>
                                </template>
                              </select>
                              <input x-model="child.value" class="px-2 py-1 border border-slate-300 text-xs" placeholder="Value">
                              <button @click="removeFilter(item, childIndex)" class="text-red-600 text-xs">x</button>
                            </div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
                <div class="flex gap-2">
                  <button @click="addFilter(filterRoot)" class="px-2 py-1 border border-slate-300 bg-white text-xs">Add filter</button>
                  <button @click="addGroup()" class="px-2 py-1 border border-slate-300 bg-white text-xs">Add group</button>
                </div>
              </div>
            </aside>

            <section class="min-w-0 bg-white border border-slate-200">
              <div class="overflow-auto max-h-[72vh]">
                <table class="min-w-full text-xs">
                  <thead class="sticky top-0 z-10 bg-slate-100 text-left text-slate-700 border-b border-slate-200">
                    <tr>
                      <template x-for="col in visibleColumns()" :key="col.key">
                        <th class="px-2 py-2 whitespace-nowrap font-semibold" x-text="col.label"></th>
                      </template>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="row in jobs" :key="row.id || JSON.stringify(row)">
                      <tr class="border-b border-slate-100 hover:bg-slate-50 align-top">
                        <template x-for="col in visibleColumns()" :key="col.key">
                          <td class="px-2 py-1.5 max-w-80 truncate" :title="cellText(row[col.key])">
                            <template x-if="col.key === 'id'">
                              <button type="button" class="text-indigo-700 hover:underline" @click="openJobDetail(row.id)" x-text="cellText(row[col.key])"></button>
                            </template>
                            <template x-if="col.key === 'title' && row.url">
                              <a class="text-indigo-700 hover:underline" :href="row.url" target="_blank" rel="noreferrer" x-text="cellText(row[col.key])"></a>
                            </template>
                            <template x-if="!(col.key === 'id') && !(col.key === 'title' && row.url)">
                              <span x-text="cellText(row[col.key])"></span>
                            </template>
                          </td>
                        </template>
                      </tr>
                    </template>
                  </tbody>
                </table>
                <div class="p-4 text-sm text-slate-500" x-show="jobsLoaded && jobs.length === 0">
                  No rows match this query.
                </div>
              </div>
            </section>
          </div>
        </div>
      </template>

      <!-- ---------------- JOB LOOKUP VIEW ---------------- -->
      <template x-if="view==='lookup'">
        <div class="space-y-4">

          <section class="bg-white rounded-xl shadow-sm ring-1 ring-slate-200 p-4">
            <form class="flex flex-col md:flex-row md:items-center gap-3" @submit.prevent="lookupJob()">
              <label class="text-sm font-medium text-slate-700" for="jobLookup">Job ID or keyword:</label>
              <input id="jobLookup" type="text" x-model="lookupQ" placeholder="JR1996524"
                     class="w-full md:w-96 px-3 py-2 rounded-lg border border-slate-300 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
              <button type="submit"
                      class="inline-flex items-center justify-center px-3 py-2 rounded-lg bg-indigo-600 text-white text-sm hover:bg-indigo-700 active:bg-indigo-800">
                Search
              </button>
              <div class="text-sm text-slate-500" x-show="lookupLoading">Searching...</div>
            </form>
          </section>

          <section class="grid grid-cols-1 lg:grid-cols-4 gap-4" x-show="lookupLoaded">
            <div class="bg-white rounded-xl shadow-sm ring-1 ring-slate-200 p-4 lg:col-span-1">
              <div class="flex items-center justify-between">
                <h2 class="text-sm font-semibold text-slate-800">Matches</h2>
                <span class="text-xs text-slate-500" x-text="lookupResults.length"></span>
              </div>

              <div class="mt-3 space-y-2" x-show="lookupResults.length">
                <template x-for="job in lookupResults" :key="job.id">
                  <button type="button" @click="selectedJobId = job.id"
                          class="w-full text-left rounded-lg border px-3 py-2 text-sm"
                          :class="selectedJobId === job.id ? 'border-indigo-400 bg-indigo-50' : 'border-slate-200 bg-white hover:bg-slate-50'">
                    <div class="font-medium text-slate-900" x-text="job.job_id"></div>
                    <div class="text-xs text-slate-500" x-text="`ID ${job.id}`"></div>
                    <div class="text-xs text-slate-500 truncate" x-text="job.site"></div>

    <script>
      function dashboard() {
        return {
          view: 'runs',

          // Runs state
          days: 30,
          runsLoaded: false,
          labels: [],
          inserted: [],
          updated: [],
          missing: [],
          unchanged: [],
          error: [],
          total_seen: [],
          net_change: [],
          recentRuns: [],
          runsVisibleLimit: 10,
          hideTestRuns: true,
          change_rate_pct: [],
          net_rate_pct: [],
          change_rate_ma7_pct: [],
          net_rate_ma7_pct: [],
          chartCounts: null,
          chartRates: null,

          // Jobs state
          jobsLoaded: false,
          queryLoading: false,
          queryPanelOpen: true,
          hours: '48',
          jobsLimit: 500,
          minAiMatch: 80,
          locationPolicy: 'any',
          jobs: [],
          jobsMeta: { returned: 0, cutoff_iso: '', min_match: null, location_policy: 'any' },
          q: '',
          availableColumns: [],
          defaultColumns: [],
          rawColumns: [],
          selectedColumns: [],
          draggedColumnKey: '',
          columnSearch: '',
          operators: [],
          filterRoot: { op: 'and', items: [] },
          queryReports: [],
          selectedReportId: '',
          reportTitle: '',
          queryMessage: '',
          queryError: false,
          activeQueryId: '',
          queryRunToken: 0,
          queryPollTimeoutMs: 0,

          // Lookup state
          lookupQ: '',
          lookupLoaded: false,
          lookupLoading: false,
          lookupResults: [],
          selectedJobId: null,

          // Discovery state
          discoveryLoaded: false,
          discoveryLoading: false,
          discoverySaving: false,
          discoverySuggestions: [],
          selectedDiscoveryIds: [],
          discoveryMessage: '',
          discoveryEvents: [],
          discoveryEventsLoaded: false,
          discoveryEventsLoadedAt: '',
          discoveryAutoRefresh: true,
          discoveryPoller: null,

          sum(arr) { return (arr || []).reduce((a,b)=>a+(b||0), 0); },

          // ---------------- RUNS ----------------
          async loadRuns() {
            this.runsLoaded = false;
            const res = await fetch(`/api/data?days=${this.days}`);
            const data = await res.json();

            this.labels = data.labels || [];
            this.inserted = data.inserted || [];
            this.updated = data.updated || [];
            this.missing = data.missing || [];
            this.unchanged = data.unchanged || [];
            this.error = data.error || [];
            this.total_seen = data.total_seen || [];
            this.net_change = data.net_change || [];
            this.recentRuns = data.recent_runs || [];
            this.runsVisibleLimit = 10;
            this.change_rate_pct = data.change_rate_pct || [];
            this.net_rate_pct = data.net_rate_pct || [];
            this.change_rate_ma7_pct = data.change_rate_ma7_pct || [];
            this.net_rate_ma7_pct = data.net_rate_ma7_pct || [];

            this.renderCountsChart();
            this.renderRatesChart();
            this.runsLoaded = true;
          },

          filteredRuns() {
            const rows = this.recentRuns || [];
            if (!this.hideTestRuns) return rows;
            return rows.filter(row => String(row.mode || '').toLowerCase() !== 'test');
          },

          visibleRuns() {
            return this.filteredRuns().slice(0, this.runsVisibleLimit);
          },

          canLoadMoreRuns() {
            return this.filteredRuns().length > this.runsVisibleLimit;
          },

          loadMoreRuns() {
            this.runsVisibleLimit += 10;
          },

          formatRunTime(value) {
            if (!value) return '-';
            const parsed = new Date(String(value).replace(' ', 'T'));
            if (Number.isNaN(parsed.getTime())) return value;
            return parsed.toLocaleString([], {
              month: 'short',
              day: 'numeric',
              year: 'numeric',
              hour: 'numeric',
              minute: '2-digit'
            });
          },

          renderCountsChart() {
            const ctx = document.getElementById('runsChart').getContext('2d');

            const barDatasets = [
              { label: 'Inserted', data: this.inserted, stack: 'impact', borderWidth: 1,
                backgroundColor: 'rgba(16, 185, 129, 0.85)', borderColor: 'rgb(16, 185, 129)' },
              { label: 'Updated', data: this.updated, stack: 'impact', borderWidth: 1,
                backgroundColor: 'rgba(59, 130, 246, 0.85)', borderColor: 'rgb(59, 130, 246)' },
              { label: 'Missing', data: this.missing, stack: 'impact', borderWidth: 1,
                backgroundColor: 'rgba(249, 115, 22, 0.9)', borderColor: 'rgb(249, 115, 22)' }
            ];

            const totalDataset = {
              label: 'Total Seen',
              data: this.total_seen,
              type: 'line',
              yAxisID: 'y',
              borderColor: 'rgb(15, 23, 42)',
              backgroundColor: 'rgba(15, 23, 42, 0.08)',
              tension: 0.25,
              pointRadius: 3,
              borderWidth: 2,
            };

            const netChangeDataset = {
              label: 'Net Change (Inserted - Missing)',
              data: this.net_change,
              type: 'line',
              yAxisID: 'y',
              borderColor: 'rgb(34, 197, 94)',
              backgroundColor: 'rgba(34, 197, 94, 0.1)',
              tension: 0.25,
              pointRadius: 3,
              borderWidth: 2,
            };

            const config = {
              type: 'bar',
              data: { labels: this.labels, datasets: [...barDatasets, totalDataset, netChangeDataset] },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { x: { stacked: true, ticks: { autoSkip: true, maxRotation: 0 } },
                          y: { stacked: true, beginAtZero: true } },
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { position: 'bottom' } }
              },
            };

            if (this.chartCounts) this.chartCounts.destroy();
            this.chartCounts = new Chart(ctx, config);
          },

          renderRatesChart() {
            const ctx = document.getElementById('runsRateChart').getContext('2d');
            const datasets = [
              { label: 'Change %', data: this.change_rate_pct,
                borderColor: 'rgb(59, 130, 246)', backgroundColor: 'rgba(59, 130, 246, 0.1)',
                tension: 0.25, pointRadius: 2, borderWidth: 2 },
              { label: 'Change % (7d avg)', data: this.change_rate_ma7_pct,
                borderColor: 'rgb(59, 130, 246)', borderDash: [4,4],
                backgroundColor: 'rgba(59, 130, 246, 0.05)', tension: 0.25, pointRadius: 0, borderWidth: 2 },
              { label: 'Net %', data: this.net_rate_pct,
                borderColor: 'rgb(34, 197, 94)', backgroundColor: 'rgba(34, 197, 94, 0.1)',
                tension: 0.25, pointRadius: 2, borderWidth: 2 },
              { label: 'Net % (7d avg)', data: this.net_rate_ma7_pct,
                borderColor: 'rgb(34, 197, 94)', borderDash: [4,4],
                backgroundColor: 'rgba(34, 197, 94, 0.05)', tension: 0.25, pointRadius: 0, borderWidth: 2 },
            ];

            const config = {
              type: 'line',
              data: { labels: this.labels, datasets },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { x: { ticks: { autoSkip: true, maxRotation: 0 } },
                          y: { beginAtZero: true, ticks: { callback: (v) => `${v}%` } } },
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { position: 'bottom' } }
              }
            };

            if (this.chartRates) this.chartRates.destroy();
            this.chartRates = new Chart(ctx, config);
          },

          // ---------------- JOBS ----------------
          queryPayload(limitOverride = null) {
            return {
              columns: this.selectedColumns.length ? this.selectedColumns : this.defaultColumns,
              limit: limitOverride || this.jobsLimit || 500,
              quick: {
                hours: this.hours || 'all',
                min_match: this.minAiMatch,
                location_policy: this.locationPolicy || 'any',
                text: this.q || ''
              },
              filter: this.filterRoot
            };
          },

          responseDetailText(value) {
            if (!value) return '';
            if (typeof value === 'string') return value;
            if (Array.isArray(value)) return value.map(item => this.responseDetailText(item)).filter(Boolean).join('; ');
            if (typeof value === 'object') return JSON.stringify(value);
            return String(value);
          },

          cleanResponseText(text) {
            return (text || '')
              .replace(/<script[\s\S]*?<\/script>/gi, ' ')
              .replace(/<style[\s\S]*?<\/style>/gi, ' ')
              .replace(/<[^>]+>/g, ' ')
              .replace(/\s+/g, ' ')
              .trim()
              .slice(0, 1000);
          },

          async readResponseBody(res) {
            const text = await res.text();
            if (!text) return {};
            try {
              return JSON.parse(text);
            } catch (err) {
              return {error: this.cleanResponseText(text) || res.statusText || 'Non-JSON response'};
            }
          },

          formatQueryError(res, data) {
            const status = `${res.status || 'HTTP'} ${res.statusText || 'error'}`.trim();
            const detail = this.responseDetailText(data?.error || data?.details || data?.message);
            return detail
              ? `An error occurred (${status}). ${detail}`
              : `An error occurred (${status}).`;
          },

          sleep(ms) {
            return new Promise(resolve => window.setTimeout(resolve, ms));
          },

          queryDebugId() {
            return this.activeQueryId ? this.activeQueryId.slice(0, 8) : '';
          },

          queryStatusText(data, fallback = 'Running query...') {
            const message = data?.message || fallback;
            const age = Number(data?.age_seconds);
            const id = data?.query_id ? String(data.query_id).slice(0, 8) : this.queryDebugId();
            const parts = [message];
            if (Number.isFinite(age)) parts.push(`elapsed=${age}s`);
            if (id) parts.push(`id=${id}`);
            return parts.join(' ');
          },

          async pollQueryJob(queryId, pollAfterMs = 1000, runToken = this.queryRunToken, ttlSeconds = null) {
            let waitMs = Math.max(250, Number(pollAfterMs) || 1000);
            const startedAt = Date.now();
            let maxPollMs = ((Number(ttlSeconds) || 3600) * 1000) + 10000;
            let networkFailures = 0;
            while (true) {
              if (runToken !== this.queryRunToken || queryId !== this.activeQueryId) {
                return {stale: true};
              }
              if (Date.now() - startedAt > maxPollMs) {
                throw new Error(`Query ${String(queryId).slice(0, 8)} timed out while polling.`);
              }
              await this.sleep(waitMs);
              if (runToken !== this.queryRunToken || queryId !== this.activeQueryId) {
                return {stale: true};
              }
              let res;
              try {
                res = await fetch(`/api/jobs/query/${encodeURIComponent(queryId)}`);
                networkFailures = 0;
              } catch (err) {
                networkFailures += 1;
                if (networkFailures <= 3) {
                  this.queryMessage = `Network issue while polling query ${String(queryId).slice(0, 8)}; retry ${networkFailures}/3...`;
                  await this.sleep(1000 * networkFailures);
                  continue;
                }
                throw new Error(`Polling failed after ${networkFailures} network errors. ${err?.message || err}`);
              }
              const data = await this.readResponseBody(res);
              if (runToken !== this.queryRunToken || queryId !== this.activeQueryId) {
                return {stale: true};
              }
              if (res.status === 202 && data.status === 'running') {
                waitMs = Math.max(250, Number(data.poll_after_ms) || waitMs);
                if (data.ttl_seconds) maxPollMs = (Number(data.ttl_seconds) * 1000) + 10000;
                this.queryPollTimeoutMs = maxPollMs;
                this.queryMessage = this.queryStatusText(data);
                continue;
              }
              if (!res.ok) {
                throw new Error(this.formatQueryError(res, data));
              }
              return data;
            }
          },

          async loadJobs() {
            const runToken = this.queryRunToken + 1;
            this.queryRunToken = runToken;
            this.activeQueryId = '';
            this.queryPollTimeoutMs = 0;
            this.jobsLoaded = false;
            this.queryLoading = true;
            this.queryError = false;
            this.queryMessage = 'Running query...';
            try {
              const res = await fetch('/api/jobs/query?background=1', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(this.queryPayload())
              });
              let data = await this.readResponseBody(res);
              if (res.status === 202 && data.query_id) {
                if (runToken !== this.queryRunToken) return;
                this.activeQueryId = data.query_id;
                this.queryPollTimeoutMs = ((Number(data.ttl_seconds) || 3600) * 1000) + 10000;
                this.queryMessage = this.queryStatusText(data, 'Query queued.');
                data = await this.pollQueryJob(data.query_id, data.poll_after_ms, runToken, data.ttl_seconds);
                if (data?.stale) return;
              } else if (!res.ok) {
                this.queryError = true;
                this.queryMessage = this.formatQueryError(res, data);
                this.jobsLoaded = true;
                return;
              }
              if (runToken !== this.queryRunToken) return;
              this.jobsMeta = {
                returned: data.returned || 0,
                min_match: data.min_match ?? null,
                location_policy: data.location_policy || 'any',
                cutoff_iso: data.cutoff_iso || ''
              };
              this.jobs = data.jobs || [];
              if (Array.isArray(data.available_columns) && data.available_columns.length) {
                this.mergeAvailableColumns(data.available_columns);
              }
              this.jobsLoaded = true;
              this.queryMessage = `Query complete. Returned ${this.jobs.length} row(s).`;
            } catch (err) {
              if (runToken !== this.queryRunToken) return;
              this.queryError = true;
              this.jobsLoaded = true;
              const message = err?.message || 'Query failed.';
              this.queryMessage = message.startsWith('An error occurred') ? message : `An error occurred. ${message}`;
            } finally {
              if (runToken === this.queryRunToken) {
                this.queryLoading = false;
              }
            }
          },

          async loadQueryBuilderMetadata() {
            const [columnsRes, reportsRes] = await Promise.all([
              fetch('/api/jobs/columns'),
              fetch('/api/query-reports')
            ]);
            const columnsData = await columnsRes.json();
            const reportsData = await reportsRes.json();
            this.availableColumns = columnsData.columns || [];
            this.defaultColumns = columnsData.default_columns || [];
            this.rawColumns = columnsData.raw_columns || [];
            this.operators = columnsData.operators || [];
            this.selectedColumns = [...this.defaultColumns];
            this.queryReports = reportsData.reports || [];
          },

          mergeAvailableColumns(columns) {
            const seen = new Set(this.availableColumns.map(col => col.key));
            for (const col of columns || []) {
              if (!seen.has(col.key)) {
                this.availableColumns.push(col);
                seen.add(col.key);
              }
            }
          },

          columnGroups() {
            const q = (this.columnSearch || '').toLowerCase().trim();
            const groups = {};
            for (const col of this.availableColumns || []) {
              if (q && !`${col.label} ${col.key}`.toLowerCase().includes(q)) continue;
              const name = col.group || 'Core';
              if (!groups[name]) groups[name] = [];
              groups[name].push(col);
            }
            return Object.entries(groups).map(([name, columns]) => ({ name, columns }));
          },

          visibleColumns() {
            const byKey = new Map((this.availableColumns || []).map(col => [col.key, col]));
            return (this.selectedColumns || []).map(key => byKey.get(key) || {key, label: key});
          },

          columnLabel(key) {
            const found = (this.availableColumns || []).find(col => col.key === key);
            return found?.label || key;
          },

          toggleColumn(key) {
            if (this.selectedColumns.includes(key)) {
              this.selectedColumns = this.selectedColumns.filter(item => item !== key);
            } else {
              this.selectedColumns = [...this.selectedColumns, key];
            }
          },

          dragColumnStart(key) {
            this.draggedColumnKey = key;
          },

          dropColumn(targetKey) {
            const sourceKey = this.draggedColumnKey;
            this.draggedColumnKey = '';
            if (!sourceKey || sourceKey === targetKey) return;
            this.reorderColumn(sourceKey, targetKey);
          },

          reorderColumn(sourceKey, targetKey) {
            const columns = [...this.selectedColumns];
            const from = columns.indexOf(sourceKey);
            const to = columns.indexOf(targetKey);
            if (from < 0 || to < 0) return;
            const [moved] = columns.splice(from, 1);
            columns.splice(to, 0, moved);
            this.selectedColumns = columns;
          },

          moveColumn(index, direction) {
            const to = index + direction;
            if (to < 0 || to >= this.selectedColumns.length) return;
            const columns = [...this.selectedColumns];
            const [moved] = columns.splice(index, 1);
            columns.splice(to, 0, moved);
            this.selectedColumns = columns;
          },

          setDefaultColumns() {
            this.selectedColumns = [...this.defaultColumns];
          },

          selectAllColumns() {
            this.selectedColumns = (this.availableColumns || []).map(col => col.key);
          },

          clearColumns() {
            this.selectedColumns = [];
          },

          selectRawColumns() {
            this.selectedColumns = [...new Set([...this.defaultColumns, ...this.rawColumns])];
          },

          newFilter() {
            return {
              id: `${Date.now()}-${Math.random()}`,
              field: (this.availableColumns[0] || {}).key || 'title',
              operator: 'contains',
              value: ''
            };
          },

          addFilter(group) {
            if (!Array.isArray(group.items)) group.items = [];
            group.items.push(this.newFilter());
          },

          addGroup() {
            this.filterRoot.items.push({ id: `${Date.now()}-${Math.random()}`, op: 'and', items: [this.newFilter()] });
          },

          removeFilter(group, index) {
            group.items.splice(index, 1);
          },

          cellText(value) {
            if (value === null || value === undefined) return '';
            if (Array.isArray(value)) return value.map(item => typeof item === 'object' ? JSON.stringify(item) : String(item)).join(', ');
            if (typeof value === 'object') return JSON.stringify(value);
            return String(value);
          },

          currentReportConfig() {
            return {
              columns: this.selectedColumns,
              limit: this.jobsLimit,
              quick: {
                hours: this.hours,
                min_match: this.minAiMatch,
                location_policy: this.locationPolicy,
                text: this.q
              },
              filter: this.filterRoot
            };
          },

          applyReportConfig(config) {
            const quick = config?.quick || {};
            this.selectedColumns = Array.isArray(config?.columns) ? [...config.columns] : [...this.defaultColumns];
            this.jobsLimit = config?.limit || 500;
            this.hours = quick.hours || '48';
            this.minAiMatch = quick.min_match ?? 80;
            this.locationPolicy = quick.location_policy || 'any';
            this.q = quick.text || '';
            this.filterRoot = config?.filter || { op: 'and', items: [] };
          },

          loadSelectedReport() {
            const report = (this.queryReports || []).find(item => String(item.id) === String(this.selectedReportId));
            if (!report) return;
            this.reportTitle = report.title;
            this.applyReportConfig(report.config || {});
          },

          async saveReport(updateExisting) {
            const title = (this.reportTitle || '').trim();
            if (!title) {
              this.queryMessage = 'Report title is required.';
              return;
            }
            const method = updateExisting && this.selectedReportId ? 'PUT' : 'POST';
            const url = updateExisting && this.selectedReportId ? `/api/query-reports/${this.selectedReportId}` : '/api/query-reports';
            const res = await fetch(url, {
              method,
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({title, config: this.currentReportConfig()})
            });
            const data = await res.json();
            if (!res.ok) {
              this.queryMessage = data.error || 'Could not save report.';
              return;
            }
            this.selectedReportId = String(data.id);
            await this.loadReports();
            this.queryMessage = `Saved report "${data.title}".`;
          },

          async loadReports() {
            const res = await fetch('/api/query-reports');
            const data = await res.json();
            this.queryReports = data.reports || [];
          },

          async deleteReport() {
            if (!this.selectedReportId) return;
            const res = await fetch(`/api/query-reports/${this.selectedReportId}`, {method: 'DELETE'});
            const data = await res.json();
            if (!res.ok) {
              this.queryMessage = data.error || 'Could not delete report.';
              return;
            }
            this.selectedReportId = '';
            this.reportTitle = '';
            await this.loadReports();
            this.queryMessage = data.deleted ? 'Deleted report.' : 'Report was already gone.';
          },

          async exportJobs(format) {
            const res = await fetch(`/api/jobs/export?format=${encodeURIComponent(format)}`, {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify(this.queryPayload(5000))
            });
            if (!res.ok) {
              const data = await res.json();
              this.queryMessage = data.error || 'Export failed.';
              return;
            }
            const blob = await res.blob();
            const href = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = href;
            a.download = `query-builder-export.${format}`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(href);
            this.queryMessage = `Exported ${format.toUpperCase()}.`;
          },

          async lookupJob() {
            const q = (this.lookupQ || '').trim();
            if (!q) return;

            this.lookupLoading = true;
            this.lookupLoaded = false;
            this.lookupResults = [];
            this.selectedJobId = null;

            const res = await fetch(`/api/job-lookup?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            this.lookupResults = data.jobs || [];
            this.selectedJobId = this.lookupResults.length ? this.lookupResults[0].id : null;
            this.lookupLoaded = true;
            this.lookupLoading = false;
          },

          async openJobDetail(id) {
            const jobId = Number(id);
            if (!Number.isFinite(jobId) || jobId <= 0) return;

            this.view = 'lookup';
            this.lookupQ = `ID ${jobId}`;
            this.lookupLoading = true;
            this.lookupLoaded = false;
            this.lookupResults = [];
            this.selectedJobId = null;

            const res = await fetch(`/api/job-detail?id=${encodeURIComponent(jobId)}`);
            const data = await res.json();
            this.lookupResults = data.job ? [data.job] : [];
            this.selectedJobId = data.job ? data.job.id : null;
            this.lookupLoaded = true;
            this.lookupLoading = false;
          },

          selectedJob() {
            return (this.lookupResults || []).find(j => j.id === this.selectedJobId) || null;
          },

          // ---------------- DISCOVERY ----------------
          async loadDiscovery() {
            this.discoveryLoading = true;
            this.discoveryMessage = '';
            const [suggestionsRes] = await Promise.all([
              fetch('/api/discovery/suggestions'),
              this.loadDiscoveryEvents()
            ]);
            const data = await suggestionsRes.json();
            this.discoverySuggestions = data.suggestions || [];
            this.selectedDiscoveryIds = this.selectedDiscoveryIds.filter(id =>
              this.discoverySuggestions.some(item => item.id === id && ['pending','approved'].includes(item.state || 'pending'))
            );
            this.discoveryLoaded = true;
            this.discoveryLoading = false;
          },

          async loadDiscoveryEvents() {
            const res = await fetch('/api/discovery/events?limit=200');
            const data = await res.json();
            this.discoveryEvents = data.events || [];
            this.discoveryEventsLoaded = true;
            this.discoveryEventsLoadedAt = new Date().toLocaleTimeString();
          },

          recentDiscoveryEvents() {
            return [...(this.discoveryEvents || [])].reverse();
          },

          eventDetails(event) {
            const skip = new Set(['timestamp', 'type', 'message', 'url']);
            const details = {};
            for (const [key, value] of Object.entries(event || {})) {
              if (!skip.has(key) && value !== null && value !== undefined && value !== '') {
                details[key] = value;
              }
            }
            return Object.keys(details).length ? JSON.stringify(details, null, 2) : '';
          },

          isDiscoverySelected(id) {
            return this.selectedDiscoveryIds.includes(id);
          },

          toggleDiscovery(id) {
            if (this.isDiscoverySelected(id)) {
              this.selectedDiscoveryIds = this.selectedDiscoveryIds.filter(x => x !== id);
            } else {
              this.selectedDiscoveryIds = [...this.selectedDiscoveryIds, id];
            }
          },

          async applyDiscoverySelected() {
            if (!this.selectedDiscoveryIds.length || this.discoverySaving) return;
            this.discoverySaving = true;
            this.discoveryMessage = '';
            try {
              const res = await fetch('/api/discovery/apply', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ids: this.selectedDiscoveryIds})
              });
              const data = await res.json();
              if (!res.ok) throw new Error(data.error || 'Apply failed');
              this.discoveryMessage = `Applied ${data.applied.length} suggestion(s); skipped ${data.skipped.length}.`;
              this.selectedDiscoveryIds = [];
              await this.loadDiscovery();
            } catch (err) {
              this.discoveryMessage = err?.message || 'Apply failed.';
            } finally {
              this.discoverySaving = false;
            }
          },

          async rejectDiscoverySelected() {
            if (!this.selectedDiscoveryIds.length || this.discoverySaving) return;
            this.discoverySaving = true;
            this.discoveryMessage = '';
            try {
              const res = await fetch('/api/discovery/reject', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ids: this.selectedDiscoveryIds})
              });
              const data = await res.json();
              if (!res.ok) throw new Error(data.error || 'Reject failed');
              this.discoveryMessage = `Rejected ${data.changed.length} suggestion(s).`;
              this.selectedDiscoveryIds = [];
              await this.loadDiscovery();
            } catch (err) {
              this.discoveryMessage = err?.message || 'Reject failed.';
            } finally {
              this.discoverySaving = false;
            }
          },

          async init() {
            this.loadRuns();
            await this.loadQueryBuilderMetadata();
            this.loadJobs();
            this.discoveryPoller = setInterval(() => {
              if (this.view === 'discovery' && this.discoveryAutoRefresh) {
                this.loadDiscoveryEvents();
              }
            }, 3000);
          }
        }
      }
    </script>
